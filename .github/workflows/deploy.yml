name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted        # ← runs directly on your EC2
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Build all images in parallel
        run: |
          echo "⏱ Build started: $(date)"
          START=$(date +%s)

          docker build -t user-service ./user-service &
          docker build -t item-service ./item-service &
          docker build -t report-service ./report-service &
          wait

          END=$(date +%s)
          echo "✅ Build time: $((END - START))s"

      - name: Deploy containers
        run: |
          START=$(date +%s)

          docker rm -f user-service item-service report-service 2>/dev/null || true

          docker run -d -p 3001:3001 --name user-service --restart unless-stopped user-service
          docker run -d -p 3002:3002 --name item-service --restart unless-stopped item-service
          docker run -d -p 3003:3003 --name report-service --restart unless-stopped report-service

          END=$(date +%s)
          echo "✅ Deploy time: $((END - START))s"
          echo "⏱ Deployment ended: $(date)"

          echo ""
          echo "📊 Resource Usage:"
          docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}"
