name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # -------------------------
  # BUILD JOBS (PARALLEL)
  # -------------------------

  build-user:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/user-service:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/user-service:cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/user-service:cache,mode=max

  build-item:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Item Service
        uses: docker/build-push-action@v5
        with:
          context: ./item-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/item-service:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/item-service:cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/item-service:cache,mode=max

  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Report Service
        uses: docker/build-push-action@v5
        with:
          context: ./report-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/report-service:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/report-service:cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/report-service:cache,mode=max

  # -------------------------
  # DEPLOY JOB
  # -------------------------

  deploy:
    needs: [build-user, build-item, build-report]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "⏱ Deployment started at: $(date)"
            START=$(date +%s)

            # Pull all images in parallel
            echo "📦 Pulling images..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/user-service:latest &
            docker pull ${{ secrets.DOCKER_USERNAME }}/item-service:latest &
            docker pull ${{ secrets.DOCKER_USERNAME }}/report-service:latest &
            wait
            echo "✅ All images pulled"

            # Remove old containers
            echo "🗑 Removing old containers..."
            docker rm -f user-service item-service report-service 2>/dev/null || true

            # Start new containers
            echo "🚀 Starting containers..."
            docker run -d -p 3001:3001 --name user-service \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/user-service:latest

            docker run -d -p 3002:3002 --name item-service \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/item-service:latest

            docker run -d -p 3003:3003 --name report-service \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/report-service:latest

            END=$(date +%s)
            echo "⏱ Deployment ended at: $(date)"
            echo "✅ Total deploy time: $((END - START)) seconds"

            # Resource metrics
            echo ""
            echo "📊 Running Containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "📊 Resource Usage:"
            docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}"
