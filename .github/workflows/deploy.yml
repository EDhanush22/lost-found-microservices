name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-user:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - name: Build User Service
        run: |
          START=$(date +%s)
          docker build -t user-service ./user-service
          END=$(date +%s)
          echo "✅ user-service build: $((END - START))s"

  build-item:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - name: Build Item Service
        run: |
          START=$(date +%s)
          docker build -t item-service ./item-service
          END=$(date +%s)
          echo "✅ item-service build: $((END - START))s"

  build-report:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - name: Build Report Service
        run: |
          START=$(date +%s)
          docker build -t report-service ./report-service
          END=$(date +%s)
          echo "✅ report-service build: $((END - START))s"

  deploy:
    needs: [build-user, build-item, build-report]
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
        - name: Deploy Containers
          run: |
            START=$(date +%s)

            docker rm -f user-service item-service report-service 2>/dev/null || true

            docker run -d -p 3001:3001 --name user-service --restart unless-stopped user-service
            docker run -d -p 3002:3002 --name item-service --restart unless-stopped item-service
            docker run -d -p 3003:3003 --name report-service --restart unless-stopped report-service

            END=$(date +%s)
            echo "✅ Deploy time: $((END - START))s"

            # ✅ Wait until user-service is actually running
            echo "⏳ Waiting for containers to initialize..."
            until [ "$(docker inspect -f '{{.State.Running}}' user-service)" == "true" ]; do
              sleep 1
            done
            sleep 3  # extra buffer after running state

            echo "📊 Resource Usage:"
            docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}"