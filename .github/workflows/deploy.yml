name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push User Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service ./user-service
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service

      - name: Build and Push Item Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/item-service ./item-service
          docker push ${{ secrets.DOCKER_USERNAME }}/item-service

      - name: Build and Push Report Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/report-service ./report-service
          docker push ${{ secrets.DOCKER_USERNAME }}/report-service

      # 👇 PASTE YOUR DEPLOY STEP HERE (LAST STEP)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull edhanush/user-service
            docker pull edhanush/item-service
            docker pull edhanush/report-service
          
            # 🔥 STOP ALL RUNNING CONTAINERS USING PORTS
            docker ps -q --filter "publish=3001" | xargs -r docker stop
            docker ps -q --filter "publish=3002" | xargs -r docker stop
            docker ps -q --filter "publish=3003" | xargs -r docker stop
          
            docker ps -aq --filter "publish=3001" | xargs -r docker rm
            docker ps -aq --filter "publish=3002" | xargs -r docker rm
            docker ps -aq --filter "publish=3003" | xargs -r docker rm
          
            # RUN NEW CONTAINERS
            docker run -d -p 3001:3001 --name user-service edhanush/user-service
            docker run -d -p 3002:3002 --name item-service edhanush/item-service
            docker run -d -p 3003:3003 --name report-service edhanush/report-service
