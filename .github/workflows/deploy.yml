name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service ./user-service
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service

  build-item:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/item-service ./item-service
          docker push ${{ secrets.DOCKER_USERNAME }}/item-service

  build-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/report-service ./report-service
          docker push ${{ secrets.DOCKER_USERNAME }}/report-service

  deploy:
    needs: [build-user, build-item, build-report]   # wait for all builds
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull edhanush/user-service
            docker pull edhanush/item-service
            docker pull edhanush/report-service

            docker rm -f user-service || true
            docker rm -f item-service || true
            docker rm -f report-service || true

            docker run -d -p 3001:3001 --name user-service edhanush/user-service
            docker run -d -p 3002:3002 --name item-service edhanush/item-service
            docker run -d -p 3003:3003 --name report-service edhanush/report-service
